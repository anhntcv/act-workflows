name: Go Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.0.0)'
        required: false
        default: 'latest'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23" # Thay bằng version Go bạn đang dùng
          cache: true # Bật cache module Go

      - name: Verify dependencies
        run: go mod verify

      - name: Tidy modules
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v -race ./...

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov (optional)
        if: github.repository_owner != '' && env.ACT != 'true'
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

      - name: Determine Next Version
        run: |
          git fetch --tags --force || true
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [ -n "${{ github.event.inputs.tag_name }}" ] && [ "${{ github.event.inputs.tag_name }}" != "latest" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_ENV
          else
            LATEST_TAG=$(git tag --list "v1.0.*" --sort=-v:refname | head -n 1)
            if [ -z "$LATEST_TAG" ]; then
              NEW_TAG="v1.0.0"
            else
              PATCH=$(echo "$LATEST_TAG" | cut -d'.' -f3)
              PATCH=$(echo "$PATCH" | tr -dc '0-9')
              NEW_PATCH=$((PATCH + 1))
              NEW_TAG="v1.0.$NEW_PATCH"
            fi
            echo "RELEASE_TAG=$NEW_TAG" >> $GITHUB_ENV
          fi

      - name: Build multi-platform binaries
        run: |
          mkdir -p dist
          # Build for Linux (amd64 & arm64)
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/act-workflows-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/act-workflows-linux-arm64 .
          # Build for macOS (Intel & Apple Silicon)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/act-workflows-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/act-workflows-darwin-arm64 .
          # Build for Windows (amd64)
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/act-workflows-windows-amd64.exe .

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        if: success() && (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')))
        uses: softprops/action-gh-release@v2
        continue-on-error: ${{ env.ACT == 'true' }}
        with:
          files: |
            dist/*
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body: |
            ## 🚀 Release Info - ${{ env.RELEASE_TAG }}
            
            ### 📦 Nền tảng được build sẵn (Pre-built Binaries):
            * **Linux**: `amd64`, `arm64`
            * **macOS (Darwin)**: `amd64` (Intel), `arm64` (Apple Silicon)
            * **Windows**: `amd64`
            
            ### 🔍 Xác thực tệp tin (Integrity Verification):
            Sử dụng mã băm trong file `checksums.txt` đi kèm để đối chiếu tính toàn vẹn của tệp tải về:
            ```bash
            sha256sum -c checksums.txt
            ```
            
            ---
            *Nhật ký thay đổi chi tiết được tự động liệt kê bên dưới.*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram Notification
        if: success() && (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')))
        continue-on-error: ${{ env.ACT == 'true' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            --data-urlencode 'text=🚀 <b>[act-workflows] New Release Published!</b>

          <b>Version:</b> <code>${{ env.RELEASE_TAG }}</code>
          <b>Branch:</b> <code>${{ github.ref_name }}</code>
          <b>Commit:</b> <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">${{ github.sha }}</a>
          <b>Released By:</b> ${{ github.actor }}

          👉 <a href="https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }}">View Release & Download Binaries</a>'
